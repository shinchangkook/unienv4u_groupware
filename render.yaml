# Render Blueprint — 유앤아이환경기술 그룹웨어 프론트엔드
# 배포 방법: Render Dashboard → New → Blueprint → 이 저장소 연결 → Apply
# 참고: 프론트엔드는 인메모리 mock API 기반 SPA로 별도 백엔드가 필요 없습니다.
services:
  - name: unienv4u-groupware-frontend
    type: web
    runtime: static
    rootDir: ./frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    # SPA(BrowserRouter) — 모든 경로를 index.html로 rewrite 해야 새로고침/직접 URL 접근이 동작
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
